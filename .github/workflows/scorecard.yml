name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '17 4 * * 1'  # weekly Mon 04:17 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload to code-scanning dashboard
      id-token: write          # OIDC for publishing results
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        # Informational metric; Code Scanning is not enabled on this repo, so
        # SARIF upload errors should not fail master CI.
        continue-on-error: true
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 30

      - name: Upload SARIF
        # Lands in repo's Security → Code scanning tab.
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          sarif_file: scorecard-results.sarif
